<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ExpenseTracker</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js for charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SheetJS for Excel export -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body style="opacity: 0; transition: opacity 0.5s;"> <!-- Hide until auth verified -->
    <div class="dashboard-layout">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="nav-brand">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
                ExpenseTracker
            </div>
            <div class="nav-actions">
                <button id="themeToggle" class="btn-icon" title="Cambiar modo oscuro">
                    <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                    <svg id="sunIcon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                </button>
                <div class="user-info">
                    <span id="userNameDisplay">Usuario</span>
                </div>
                <button id="logoutBtn" class="btn btn-outline" style="padding: 0.5rem 1rem;">
                    Salir
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-title">Gastos de este mes</div>
                    <div class="stat-value" id="monthlyTotal">$0.00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Total histórico</div>
                    <div class="stat-value" id="allTimeTotal">$0.00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Categoría principal</div>
                    <div class="stat-value" id="topCategory">-</div>
                </div>
            </div>

            <!-- Dashboard Grid -->
            <div class="dashboard-grid">
                <!-- Data Table Area -->
                <div class="data-area">
                    <div class="card">
                        <div class="card-header">
                            <h2 class="card-title">Mis Gastos</h2>
                            <div class="actions">
                                <button id="exportBtn" class="btn btn-outline" style="padding: 0.5rem 1rem;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:0.5rem"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                                    Exportar CSV
                                </button>
                                <button class="btn btn-primary" onclick="openModal('addExpenseModal')" style="padding: 0.5rem 1rem;">
                                    + Nuevo Gasto
                                </button>
                            </div>
                        </div>

                        <div class="filter-bar">
                            <input type="text" id="searchInput" class="form-control" placeholder="Buscar descripción...">
                            <select id="categoryFilter" class="form-control">
                                <option value="">Todas las categorías</option>
                                <!-- Categories populated via JS -->
                            </select>
                            <select id="sortSort" class="form-control">
                                <option value="fecha_desc">Fecha (Nuevos primero)</option>
                                <option value="fecha_asc">Fecha (Antiguos primero)</option>
                                <option value="monto_desc">Monto (Mayor a menor)</option>
                                <option value="monto_asc">Monto (Menor a mayor)</option>
                            </select>
                        </div>

                        <div class="table-container">
                            <table id="expensesTable">
                                <thead>
                                    <tr>
                                        <th>Fecha</th>
                                        <th>Descripción</th>
                                        <th>Categoría</th>
                                        <th>Monto</th>
                                        <th style="text-align: right;">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="expensesTableBody">
                                    <!-- Populated via JS -->
                                    <tr>
                                        <td colspan="5" class="text-center" style="padding: 2rem;">Cargando gastos...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Sidebar Area (Charts/Forms) -->
                <div class="sidebar-area">
                    <div class="card mb-4" style="height: 350px;">
                        <h2 class="card-title" style="margin-bottom: 1rem;">Gastos por categoría</h2>
                        <div style="position: relative; height: 260px; width: 100%;">
                            <canvas id="categoryChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Monthly Chart -->
            <div class="card" style="height: 400px;">
                <h2 class="card-title" style="margin-bottom: 1rem;">Tendencia mensual</h2>
                <div style="position: relative; height: 310px; width: 100%;">
                    <canvas id="monthlyChart"></canvas>
                </div>
            </div>

        </main>
    </div>

    <!-- Modals -->
    <div id="addExpenseModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="card-title" id="modalTitle">Nuevo Gasto</h2>
                <button class="btn-close" onclick="closeModal('addExpenseModal')">&times;</button>
            </div>
            <form id="expenseForm">
                <input type="hidden" id="expenseId">
                <div class="form-group">
                    <label for="expenseDesc">Descripción</label>
                    <input type="text" id="expenseDesc" class="form-control" required placeholder="Ej. Compra de supermercado">
                </div>
                <div class="form-group">
                    <label for="expenseCat">Categoría</label>
                    <select id="expenseCat" class="form-control" required>
                        <option value="">Selecciona una categoría</option>
                        <!-- Populated via JS -->
                    </select>
                </div>
                <div class="form-group" style="display: flex; gap: 1rem;">
                    <div style="flex: 1;">
                        <label for="expenseAmount">Monto</label>
                        <input type="number" id="expenseAmount" class="form-control" required min="0.01" step="0.01" placeholder="0.00">
                    </div>
                    <div style="flex: 1;">
                        <label for="expenseDate">Fecha</label>
                        <input type="date" id="expenseDate" class="form-control" required>
                    </div>
                </div>
                <div id="expenseError" class="error-message mb-4"></div>
                <div class="actions" style="justify-content: flex-end; margin-top: 1.5rem;">
                    <button type="button" class="btn btn-outline" style="width: auto;" onclick="closeModal('addExpenseModal')">Cancelar</button>
                    <button type="submit" class="btn btn-primary" style="width: auto;" id="saveExpenseBtn">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="app.js"></script>
</body>
</html>
