<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - ExpenseTracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Bienvenido de nuevo</h1>
            <p>Ingresa a tu cuenta para gestionar tus gastos</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" class="form-control" required placeholder="tu@email.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                
                <div id="errorMessage" class="error-message mb-4"></div>
                
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span>Iniciar sesión</span>
                </button>
            </form>
            
            <p class="mt-4" style="margin-bottom: 0;">
                ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMessage');
            
            errorDiv.classList.remove('show');
            btn.innerHTML = '<div class="loader"></div> Ingresando...';
            btn.disabled = true;

            const { data, error } = await supabase.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.add('show');
                btn.innerHTML = '<span>Iniciar sesión</span>';
                btn.disabled = false;
            } else {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
